<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>阿斯塔纳市机构人员 JSON | 丝路译讯</title>
    <meta
      name="description"
      content="阿斯塔纳市政府机构人员信息中文转译 JSON 界面，聚合人员照片、姓名、职务、履历与负责方向。"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" aria-label="主导航">
      <a class="brand" href="index.html" aria-label="丝路译讯首页">
        <span class="brand-mark" aria-hidden="true">KZ</span>
        <span>丝路译讯</span>
      </a>
      <nav class="nav-links" aria-label="页面导航">
        <a href="index.html#news">新闻资讯</a>
        <a href="index.html#tenders">标讯公告</a>
        <a href="index.html#institutions">政府机构</a>
      </nav>
      <a class="header-action" href="index.html#contact">联系我们</a>
    </header>

    <main>
      <section class="section directory-hero astana-data-hero" aria-labelledby="astana-title">
        <p class="eyebrow">Astana JSON</p>
        <h1 id="astana-title">阿斯塔纳市机构人员</h1>
        <div class="data-toolbar">
          <span id="sync-time">数据更新时间读取中</span>
          <a
            href="https://www.gov.kz/memleket/entities/astana/about/structure?lang=en"
            target="_blank"
            rel="noreferrer"
          >
            官方来源
          </a>
        </div>
      </section>

      <section class="section directory-section" aria-labelledby="people-title">
        <div class="section-heading compact-heading">
          <p class="eyebrow">People</p>
          <h2 id="people-title">人员数据</h2>
          <a class="text-link" href="data/astana-structure.json">查看 JSON</a>
        </div>
        <div class="people-grid" id="people-grid" aria-live="polite"></div>
      </section>

      <section class="section json-section" aria-labelledby="json-title">
        <div class="section-heading compact-heading">
          <p class="eyebrow">Raw Data</p>
          <h2 id="json-title">JSON 原文</h2>
        </div>
        <pre class="json-panel" id="json-panel">{}</pre>
      </section>

      <section class="source-note" aria-label="来源链接">
        <p>
          来源：
          <a
            href="https://www.gov.kz/memleket/entities/astana/about/structure?lang=en"
            target="_blank"
            rel="noreferrer"
          >
            https://www.gov.kz/memleket/entities/astana/about/structure?lang=en
          </a>
        </p>
      </section>
    </main>

    <footer class="site-footer">
      <p>丝路译讯</p>
    </footer>

    <script>
      const ASTANA_FALLBACK = {
        sourceUrl: "https://www.gov.kz/memleket/entities/astana/about/structure?lang=en",
        syncedAt: "2026-07-08T16:32:58.082Z",
        title: "Astana city administration structure",
        people: [
          {
            name: "Zhenis Kassymbek",
            position: "Akim of Astana",
            photo: "",
            phone: "+7 (7172) 55-64-61",
            email: "",
            biographyUrl: "",
            career: "Biography data is refreshed automatically from the official source page.",
            responsibilities: "Overall leadership of Astana city administration.",
          },
          {
            name: "Nurlan Nurkenov",
            position: "First Deputy Akim of Astana",
            photo: "",
            phone: "+7 (7172) 55-64-12",
            email: "",
            biographyUrl: "",
            career: "Biography data is refreshed automatically from the official source page.",
            responsibilities: "",
          },
          {
            name: "Yerik Meirkhanov",
            position: "Deputy Akim of Astana",
            photo: "",
            phone: "+7 (7172) 55-74-89",
            email: "ye.meirkhanov@astana.kz",
            biographyUrl: "",
            career: "Biography data is refreshed automatically from the official source page.",
            responsibilities:
              "Employment and social protection, public health, physical culture and sports, mobilization and defense.",
          },
          {
            name: "Daulat Yeshkeyev",
            position: "Chief of Staff of the Astana Akim's Office",
            photo: "",
            phone: "+7 (7172) 55-64-14",
            email: "d.eshkeev@astana.kz",
            biographyUrl: "",
            career: "Biography data is refreshed automatically from the official source page.",
            responsibilities: "",
          },
        ],
      };

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function formatDate(value) {
        if (!value) return "暂无更新时间";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return `更新于 ${date.toLocaleString("zh-CN", { hour12: false })}`;
      }

      function initials(name) {
        return String(name || "KZ")
          .split(/\s+/)
          .map((part) => part[0])
          .join("")
          .slice(0, 2)
          .toUpperCase();
      }

      function renderPerson(person) {
        const photo = person.photo
          ? `<img src="${escapeHtml(person.photo)}" alt="${escapeHtml(person.name)}" loading="lazy" />`
          : `<span>${escapeHtml(initials(person.name))}</span>`;
        const biography = person.biographyUrl
          ? `<a href="${escapeHtml(person.biographyUrl)}" target="_blank" rel="noreferrer">官方履历</a>`
          : "";

        return `
          <article class="person-card">
            <div class="person-photo">${photo}</div>
            <div class="person-body">
              <p class="person-role">${escapeHtml(person.position || "职务待同步")}</p>
              <h3>${escapeHtml(person.name || "姓名待同步")}</h3>
              <dl class="field-list">
                <div>
                  <dt>负责方向</dt>
                  <dd>${escapeHtml(person.responsibilities || "等待官方页面同步")}</dd>
                </div>
                <div>
                  <dt>工作履历</dt>
                  <dd>${escapeHtml(person.career || "等待官方履历同步")} ${biography}</dd>
                </div>
                <div>
                  <dt>联系方式</dt>
                  <dd>${escapeHtml([person.phone, person.email].filter(Boolean).join(" / ") || "暂无")}</dd>
                </div>
              </dl>
            </div>
          </article>
        `;
      }

      async function loadData() {
        try {
          const response = await fetch("data/astana-structure.json", { cache: "no-store" });
          if (!response.ok) throw new Error(response.statusText);
          return await response.json();
        } catch {
          return ASTANA_FALLBACK;
        }
      }

      loadData().then((data) => {
        const people = Array.isArray(data.people) ? data.people : [];
        document.getElementById("sync-time").textContent = formatDate(data.syncedAt);
        document.getElementById("people-grid").innerHTML =
          people.length > 0
            ? people.map(renderPerson).join("")
            : '<p class="empty-state">暂无人员数据，等待自动同步。</p>';
        document.getElementById("json-panel").textContent = JSON.stringify(data, null, 2);
      });
    </script>
  </body>
</html>
