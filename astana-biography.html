<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>人员履历 | 丝路译讯</title>
    <meta
      name="description"
      content="阿斯塔纳市政府人员履历中文转译页面，保留英文原文并提供中文参考译文。"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" aria-label="主导航">
      <a class="brand" href="index.html" aria-label="丝路译讯首页">
        <span class="brand-mark" aria-hidden="true">KZ</span>
        <span>丝路译讯</span>
      </a>
      <nav class="nav-links" aria-label="页面导航">
        <a href="index.html#news">新闻资讯</a>
        <a href="index.html#tenders">标讯公告</a>
        <a href="index.html#institutions">政府机构</a>
      </nav>
      <a class="header-action" href="index.html#contact">联系我们</a>
    </header>

    <main>
      <section class="section biography-card-section" aria-live="polite">
        <div class="biography-shell" id="biography-shell">
          <p class="empty-state">正在读取人员履历数据...</p>
        </div>
      </section>

      <section class="source-note biography-source-note" aria-label="来源链接">
        <p id="source-note">本页面内容翻译自原网站，中文翻译仅供参考。</p>
      </section>
    </main>

    <footer class="site-footer">
      <p>丝路译讯</p>
    </footer>

    <script>
      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function initials(name) {
        return String(name || "KZ")
          .split(/\s+/)
          .map((part) => part[0])
          .join("")
          .slice(0, 2)
          .toUpperCase();
      }

      function slugify(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "");
      }

      function paragraphs(value) {
        return String(value || "")
          .split(/\n+/)
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => `<p>${escapeHtml(line)}</p>`)
          .join("");
      }

      function renderTextBlock(title, value) {
        return `
          <article class="biography-text-card">
            <h3>${escapeHtml(title)}</h3>
            ${paragraphs(value || "暂无官方同步内容")}
          </article>
        `;
      }

      function renderPerson(person) {
        const photo = person.photo
          ? `<img src="${escapeHtml(person.photo)}" alt="${escapeHtml(person.name)}" loading="lazy" />`
          : `<span>${escapeHtml(initials(person.name))}</span>`;
        const displayName = person.nameZh || person.name;
        const displayPosition = person.positionZh || person.position || "职务待同步";
        const sourceUrl = person.biographyUrl || "https://www.gov.kz/memleket/entities/astana/about/structure/people/307?lang=en";

        document.getElementById("source-note").innerHTML = `
          本页面内容翻译自原网站，中文翻译仅供参考。来源：
          <a href="${escapeHtml(sourceUrl)}" target="_blank" rel="noreferrer">${escapeHtml(sourceUrl)}</a>
        `;

        return `
          <div class="biography-profile-card">
            <div class="biography-photo">${photo}</div>
            <div class="biography-profile-main">
              <p class="eyebrow">Personnel Biography</p>
              <h1>${escapeHtml(displayName)}</h1>
              <dl class="biography-meta">
                <div>
                  <dt>英文姓名</dt>
                  <dd>${escapeHtml(person.name || "暂无")}</dd>
                </div>
                <div>
                  <dt>职务</dt>
                  <dd>${escapeHtml(displayPosition)}</dd>
                </div>
                <div>
                  <dt>英文职务</dt>
                  <dd>${escapeHtml(person.position || "暂无")}</dd>
                </div>
                <div>
                  <dt>联系方式</dt>
                  <dd>${escapeHtml([person.receptionPhone || person.phone, person.email].filter(Boolean).join(" / ") || "暂无")}</dd>
                </div>
              </dl>
            </div>
          </div>

          <div class="biography-card-grid">
            ${renderTextBlock("中文译文：基本信息与教育背景", person.generalInfoZh || person.detailZh)}
            ${renderTextBlock("中文译文：工作履历", person.careerHistoryZh || person.detailZh)}
            ${renderTextBlock("English Original: General information, education", person.generalInfo)}
            ${renderTextBlock("English Original: Career", person.careerHistory)}
          </div>
        `;
      }

      async function loadData() {
        const response = await fetch("data/astana-structure.json", { cache: "no-store" });
        if (!response.ok) throw new Error(response.statusText);
        return response.json();
      }

      loadData()
        .then((data) => {
          const people = Array.isArray(data.people) ? data.people : [];
          const selectedId = new URLSearchParams(location.search).get("id");
          const person = people.find((item) => slugify(item.name) === selectedId) || people[0];
          document.title = `${person?.nameZh || person?.name || "人员履历"} | 丝路译讯`;
          document.getElementById("biography-shell").innerHTML = person
            ? renderPerson(person)
            : '<p class="empty-state">暂无人员履历数据，等待自动同步。</p>';
        })
        .catch(() => {
          document.getElementById("biography-shell").innerHTML =
            '<p class="empty-state">数据读取失败，请稍后再试。</p>';
        });
    </script>
  </body>
</html>
