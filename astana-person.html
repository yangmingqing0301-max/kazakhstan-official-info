<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>阿斯塔纳市人员履历 | 丝路译讯</title>
    <meta
      name="description"
      content="阿斯塔纳市政府人员履历，按当前网站风格展示官方来源中的图片、职务、履历与联系方式。"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" aria-label="主导航">
      <a class="brand" href="index.html" aria-label="丝路译讯首页">
        <span class="brand-mark" aria-hidden="true">KZ</span>
        <span>丝路译讯</span>
      </a>
      <nav class="nav-links" aria-label="页面导航">
        <a href="index.html#news">新闻资讯</a>
        <a href="index.html#tenders">标讯公告</a>
        <a href="index.html#institutions">政府机构</a>
      </nav>
      <a class="header-action" href="index.html#contact">联系我们</a>
    </header>

    <main>
      <section class="section directory-section person-detail-section" aria-live="polite">
        <div class="person-detail-header">
          <h1 id="person-title">人员履历</h1>
        </div>
        <article class="person-detail" id="person-detail"></article>
      </section>

      <section class="source-note" aria-label="来源链接">
        <p>
          来源：
          <a
            href="https://www.gov.kz/memleket/entities/astana/about/structure?lang=en"
            target="_blank"
            rel="noreferrer"
          >
            https://www.gov.kz/memleket/entities/astana/about/structure?lang=en
          </a>
        </p>
      </section>
    </main>

    <footer class="site-footer">
      <p>丝路译讯</p>
    </footer>

    <script>
      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function initials(name) {
        return String(name || "KZ")
          .split(/\s+/)
          .map((part) => part[0])
          .join("")
          .slice(0, 2)
          .toUpperCase();
      }

      function slugify(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "-")
          .replace(/^-|-$/g, "");
      }

      function paragraphs(value) {
        return String(value || "")
          .split(/\n+/)
          .map((line) => line.trim())
          .filter(Boolean)
          .map((line) => `<p>${escapeHtml(line)}</p>`)
          .join("");
      }

      function splitBiography(person) {
        if (person.generalInfo || person.careerHistory) {
          return {
            general: person.generalInfo || "等待官方页面同步",
            career: person.careerHistory || "等待官方页面同步",
          };
        }

        const detail = String(person.detail || person.career || "").trim();
        if (!detail) {
          return {
            general: "等待官方页面同步",
            career: "等待官方页面同步",
          };
        }

        const careerMarker = "Career experience includes";
        if (detail.includes(careerMarker)) {
          const [general, career] = detail.split(careerMarker);
          return {
            general: general.trim(),
            career: `${careerMarker}${career || ""}`.trim(),
          };
        }

        const parts = detail.split(/\n+/).map((line) => line.trim()).filter(Boolean);
        return {
          general: parts[0] || detail,
          career: parts.slice(1).join("\n") || "等待官方页面同步",
        };
      }

      function renderPerson(person) {
        const photo = person.photo
          ? `<img src="${escapeHtml(person.photo)}" alt="${escapeHtml(person.name)}" loading="lazy" />`
          : `<span>${escapeHtml(initials(person.name))}</span>`;
        const biography = splitBiography(person);

        return `
          <aside class="person-detail-side">
            <div class="person-detail-photo">${photo}</div>
            <dl class="person-contact-list">
              <div>
                <dt>Reception phone number:</dt>
                <dd>${escapeHtml(person.receptionPhone || person.phone || "暂无")}</dd>
              </div>
              <div>
                <dt>E-mail:</dt>
                <dd>${escapeHtml(person.email || "暂无")}</dd>
              </div>
            </dl>
          </aside>
          <div class="person-detail-body gov-style-body">
            <p class="person-role">${escapeHtml(person.position || "职务待同步")}</p>
            <section>
              <h3>General information, education</h3>
              ${paragraphs(biography.general)}
            </section>
            <section>
              <h3>Career</h3>
              ${paragraphs(biography.career)}
            </section>
          </div>
        `;
      }

      async function loadData() {
        const response = await fetch("data/astana-structure.json", { cache: "no-store" });
        if (!response.ok) throw new Error(response.statusText);
        return response.json();
      }

      loadData()
        .then((data) => {
          const people = Array.isArray(data.people) ? data.people : [];
          const selectedId = new URLSearchParams(location.search).get("id");
          const person = people.find((item) => slugify(item.name) === selectedId) || people[0];
          document.getElementById("person-title").textContent = person?.name || "人员履历";
          document.getElementById("person-detail").innerHTML = person
            ? renderPerson(person)
            : '<p class="empty-state">暂无人员数据，等待自动同步。</p>';
        })
        .catch(() => {
          document.getElementById("person-detail").innerHTML =
            '<p class="empty-state">数据读取失败，请稍后再试。</p>';
        });
    </script>
  </body>
</html>
